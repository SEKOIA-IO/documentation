name: Ask preview removal for a given PR

on:
  pull_request:
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Save PR number
        run: |
          mkdir PR
          echo ${{ github.event.number }} > ./PR/PR_NUMBER

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: PR
          path: PR/

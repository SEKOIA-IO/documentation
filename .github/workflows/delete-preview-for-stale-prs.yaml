name: Delete previews for stale PRs

on:
  pull_request_target:
    types:
      - labeled

permissions: {}

jobs:
  build:
    permissions:
      contents: read  # for actions/checkout to fetch code
      issues: write  # for ./.github/actions/delete-preview (peter-evans/find-comment) to search comments
      pull-requests: write  # for ./.github/actions/delete-preview (peter-evans/create-or-update-comment) to create or update comment
    if: ${{ github.event.label.name == 'stale' }}
    runs-on: ubuntu-latest

    steps:
    - name: Check-out the repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Delete preview
      uses: ./.github/actions/delete-preview
      with:
        pull_request_id: ${{ github.event.number }}
        os_tenant_id: ${{ secrets.PR_OS_TENANT_ID }}
        os_tenant_name: ${{ secrets.PR_OS_TENANT_NAME }}
        os_username: ${{ secrets.PR_OS_USERNAME }}
        os_password: ${{ secrets.PR_OS_PASSWORD }}
        github_token: ${{ secrets.GITHUB_TOKEN }}
        message: |
          _Preview was removed as the PR is stale._
